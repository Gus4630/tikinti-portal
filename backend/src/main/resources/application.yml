server:
  port: 8080

spring:
  application:
    name: tikinti-portal
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARICP_MAX_POOL_SIZE:5}
      minimum-idle: ${HIKARICP_MIN_IDLE:1}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        default_batch_fetch_size: 50
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USERNAME}
    password: ${RABBIT_PASSWORD}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    ROOT: INFO
    az.tikinti.portal: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

application:
  client:
    cbar:
      base-url: ${CBAR_BASE_URL:https://cbar.az}
  jwt:
    access-secret: ${JWT_ACCESS_SECRET}
    refresh-secret: ${JWT_REFRESH_SECRET}
    access-expiry-minutes: ${JWT_ACCESS_EXPIRY_MINUTES:15}
    refresh-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:30}
  upload:
    dir: ${UPLOAD_DIR:uploads}
  gemini:
    api-url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta}
    api-key: ${GEMINI_API_KEY:}
    primary-model: ${GEMINI_PRIMARY_MODEL}
    fallback-model: ${GEMINI_FALLBACK_MODEL}
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    chat-id: ${TELEGRAM_CHAT_ID:}
